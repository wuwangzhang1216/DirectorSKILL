name: markdownlint

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: "**/*.md"
